    <script>
      // YOHAKU Design System — mirrored from tailwind.config.js
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              yohaku: {
                'bg-main':      '#F5F5F7',
                'text-main':    '#1D1D1F',
                'text-muted':   '#A1A1A6',
                'accent':       '#007AFF',
                'danger':       '#FF3B30',
                'border-light': 'rgba(0,0,0,0.05)',
              },
            },
            keyframes: {
              'fade-in-up': {
                '0%':   { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)'    },
              },
              'fade-in-down': {
                '0%':   { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)'     },
              },
              'fade-in': {
                '0%':   { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'fade-in-right': {
                '0%':   { opacity: '0', transform: 'translateX(-10px)' },
                '100%': { opacity: '1', transform: 'translateX(0)'     },
              },
            },
            animation: {
              'fade-in-up':    'fade-in-up    0.2s ease-out both',
              'fade-in-down':  'fade-in-down  0.2s ease-out both',
              'fade-in':       'fade-in       0.2s ease-out both',
              'fade-in-right': 'fade-in-right 0.2s ease-out both',
            },
          },
        },
      }
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/lxgw-wenkai-tc@5.2.8/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iansui@5.2.7/index.css">
    <style>
      body {
        background-color: #F5F5F7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      /* ── YOHAKU Design System Tokens ─────────────────────────────────────
         CDN Tailwind JIT cannot scan Vite-compiled ESM modules, so custom
         token classes are declared here as static CSS to guarantee they load.
      ──────────────────────────────────────────────────────────────────── */
      .text-yohaku-text-main   { color: #1D1D1F; }
      .text-yohaku-text-muted  { color: #A1A1A6; }
      .text-yohaku-accent      { color: #007AFF; }
      .text-yohaku-danger      { color: #FF3B30; }
      .bg-yohaku-bg-main       { background-color: #F5F5F7; }
      .border-yohaku-accent    { border-color: #007AFF; }
      .border-yohaku-border-light { border-color: rgba(0,0,0,0.05); }
      .accent-yohaku-accent    { accent-color: #007AFF; }

      /* Hover overrides */
      .hover\:text-yohaku-text-main:hover  { color: #1D1D1F; }
      .hover\:text-yohaku-text-muted:hover { color: #A1A1A6; }

      /* ── Entrance Animations ─────────────────────────────────────────── */
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in-down {
        from { opacity: 0; transform: translateY(-10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes fade-in-right {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .animate-fade-in-up    { animation: fade-in-up    0.2s ease-out both; }
      .animate-fade-in-down  { animation: fade-in-down  0.2s ease-out both; }
      .animate-fade-in       { animation: fade-in       0.2s ease-out both; }
      .animate-fade-in-right { animation: fade-in-right 0.2s ease-out both; }
      /* ── AI Generating Shimmer ───────────────────────────────────── */
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      @keyframes progress-bar {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .animate-shimmer {
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      .animate-progress-bar {
        background: linear-gradient(90deg, #AF52DE, #007AFF, #34C759, #007AFF, #AF52DE);
        background-size: 200% 100%;
        animation: progress-bar 2s linear infinite;
      }
      /* Cubic 11 俐方體 via jsDelivr */
      @font-face {
        font-family: 'Cubic 11';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('https://cdn.jsdelivr.net/gh/ACh-K/Cubic-11@v1.451/fonts/web/Cubic_11.woff2') format('woff2'),
             url('https://cdn.jsdelivr.net/gh/ACh-K/Cubic-11@v1.451/fonts/web/Cubic_11.woff') format('woff');
      }
    </style>
